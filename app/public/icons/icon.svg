<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>
  <!-- Pirate hat brim -->
  <ellipse cx="256" cy="175" rx="155" ry="28" fill="#222"/>
  <!-- Pirate hat body -->
  <path d="M120 175 C120 175 140 70 256 70 C372 70 392 175 392 175 C370 155 340 140 256 140 C172 140 142 155 120 175Z" fill="url(#hat)"/>
  <!-- Hat band -->
  <path d="M130 170 C130 170 160 150 256 150 C352 150 382 170 382 170" stroke="#c9a227" stroke-width="6" fill="none"/>
  <!-- Skull on hat -->
  <circle cx="256" cy="120" r="18" fill="#e2e8f0"/>
  <circle cx="250" cy="117" r="4" fill="#0f172a"/>
  <circle cx="262" cy="117" r="4" fill="#0f172a"/>
  <path d="M250 128 L256 132 L262 128" stroke="#0f172a" stroke-width="2" fill="none"/>
  <!-- Crossbones -->
  <path d="M236 130 L276 110" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <path d="M236 110 L276 130" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <!-- "W" letter - stylized like a terminal prompt -->
  <text x="256" y="360" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="220" font-weight="bold" fill="#22d3ee">W</text>
  <!-- Terminal cursor blink -->
  <rect x="370" y="280" width="16" height="4" fill="#22d3ee" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Subtle terminal prompt -->
  <text x="130" y="404" font-family="'Courier New', Courier, monospace" font-size="36" fill="#64748b">$</text>
</svg>
